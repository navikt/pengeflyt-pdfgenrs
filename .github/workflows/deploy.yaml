name: Deploy

env:
  TZ: Europe/Oslo

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '.github/**'
  schedule:
    # Deploy den 3. i hver måned kl. 08.23 (så er vi innafor "bygg og deploy minst hver 3. måned"-etterlevelseskravet)
    - cron: "23 8 3 * *"

jobs:
  build:
    permissions:
      contents: read
      actions: read
      checks: write
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Test
        run: ./gradlew test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-report
          path: build/reports/tests/test

      - name: Push docker image to GAR and sign image
        uses: nais/docker-build-push@be85229e81c0293c265c646c084f05317fb6e0d2 # v0
        id: docker-build-push
        with:
          team: oppgjorsrapporter
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          tag: ${{ github.sha }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}


  deploy_to_dev:
    name: Deploy to dev
    needs: [build]
    permissions:
      contents: read
      id-token: write
    uses: navikt/pengeflyt-gha-workflows/.github/workflows/nais-app-deploy.yaml@main
    secrets: inherit
    with:
      cluster: dev-gcp
      resource: .nais/naiserator-dev.yaml
      image: ${{ needs.build.outputs.image }}

  deploy_to_prod:
    name: Deploy to prod
    if: github.ref == 'refs/heads/main'
    needs: [build, deploy_to_dev]
    permissions:
      contents: read
      id-token: write
    uses: navikt/pengeflyt-gha-workflows/.github/workflows/nais-app-deploy.yaml@main
    secrets: inherit
    with:
      cluster: prod-gcp
      resource: .nais/naiserator-prod.yaml
      image: ${{ needs.build.outputs.image }}
